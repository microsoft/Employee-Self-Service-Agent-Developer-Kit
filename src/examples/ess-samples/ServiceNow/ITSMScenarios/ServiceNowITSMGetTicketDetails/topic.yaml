kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: TicketNumber
    description: The ServiceNow incident number (e.g., INC0012345). If the user provides a ticket number in their request, extract it automatically.
    entity: StringPrebuiltEntity
    shouldPromptUser: false

modelDescription: |-
  You will respond to requests about the status of a specific IT support ticket
  from ServiceNow ITSM. The user may provide a ticket number directly or you
  may need to ask for it.

  Example valid requests:
  "What's the status of INC0012345?"
  "Check on my IT ticket"
  "Give me an update on my incident"
  "What happened with ticket INC0056789?"

  Example invalid requests:
  "Show me all my tickets" (use Get User Tickets instead)
  "Create a ticket" (use Create Ticket instead)

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - What's the status of my IT ticket?
      - Check on my IT ticket
      - Give me an update on my incident
      - What happened with ticket INC0012345?
      - Track my IT ticket status

  actions:
    - kind: ConditionGroup
      id: checkTicketNumber
      conditions:
        - id: needsInput
          condition: =IsBlank(Topic.TicketNumber)
          actions:
            - kind: Question
              id: askTicketNumber
              variable: Topic.TicketNumber
              prompt: "What's the ticket number? (e.g., INC0012345)"
              entity: StringPrebuiltEntity

    - kind: SendActivity
      id: sendLookup
      activity: ="Looking up ticket " & Topic.TicketNumber & "..."

    - kind: BeginDialog
      id: callSharedFlow
      displayName: Redirect to ServiceNow ITSM System Common Execution
      input:
        binding:
          scenarioName: msdyn_ITServiceNowITSMGetTicketDetails
          parameters: ="{""params"":[{""key"":""{TicketNumber}"",""value"":""" & Topic.TicketNumber & """}]}"
      dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemCommonExecution
      output:
        binding:
          isSuccess: Topic.isSuccess
          responseData: Topic.responseData
          errorResponse: Topic.errorResponse

    - kind: ConditionGroup
      id: checkResult
      conditions:
        - id: success
          condition: =Topic.isSuccess = true
          actions:
            - kind: AnswerQuestionWithAI
              id: formatResponse
              autoSend: true
              userInput: =Topic.responseData
              additionalInstructions: Display the ticket details in a clear format showing Ticket Number, Summary, Status, Priority, Category, Assigned To, and Last Updated. If the ticket is resolved or closed, mention the resolution notes if available.
        - id: failure
          condition: =Topic.isSuccess = false
          actions:
            - kind: SendActivity
              id: sendError
              activity: ="I couldn't find ticket " & Topic.TicketNumber & ". Please verify the number and try again."

    - kind: EndDialog
      id: endTopic

inputType:
  properties:
    TicketNumber:
      displayName: TicketNumber
      description: The ServiceNow incident number (e.g., INC0012345)
      type: String
