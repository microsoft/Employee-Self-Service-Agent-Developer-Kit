kind: AdaptiveDialog
modelDescription: |-
  You will respond to requests related to creating an HR case or HR service request
  in ServiceNow HRSD. This topic collects the case details from the user and
  submits them to ServiceNow via the shared ESS orchestrator flow.

  Example valid requests:
  "I need to create an HR case"
  "Open an HR service request"
  "I need help from HR"
  "Submit an HR case about my benefits"
  "I have an HR issue I need to report"

  Example invalid requests:
  "Create an IT ticket" (use ITSM Create Ticket instead)
  "What are my HR cases?" (use Get User Cases instead)

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - I need to create an HR case
      - Open an HR service request
      - I need help from HR
      - Submit an HR case
      - I have an HR issue I need to report
      - Create a case in ServiceNow HR

  actions:
    - kind: SendActivity
      id: sendIntro
      activity: "I can help you create an HR case. Let me collect a few details."

    - kind: Question
      id: askSubject
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Subject
      prompt: "What's a short summary of your HR issue?"
      entity: StringPrebuiltEntity

    - kind: Question
      id: askDescription
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Description
      prompt: "Please describe the issue in more detail."
      entity: StringPrebuiltEntity

    - kind: Question
      id: askPriority
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Priority
      prompt: "What priority should this case be?"
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: high
              displayName: High
            - id: medium
              displayName: Medium
            - id: low
              displayName: Low

    - kind: AdaptiveCardPrompt
      id: confirmCard
      displayName: Confirm HR Case Details
      card: |-
        ={
          type: "AdaptiveCard",
          '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "Please confirm the HR case details:",
              weight: "Bolder",
              size: "Medium",
              wrap: true
            },
            {
              type: "FactSet",
              facts: [
                { title: "Subject", value: Topic.Subject },
                { title: "Description", value: Topic.Description },
                { title: "Priority", value: Topic.Priority }
              ]
            }
          ],
          actions: [
            { type: "Action.Submit", title: "Submit Case", data: { action: "confirm" } },
            { type: "Action.Submit", title: "Cancel", data: { action: "cancel" } }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          action: Topic.confirmAction
      outputType:
        properties:
          actionSubmitId: String
          action: String

    - kind: ConditionGroup
      id: checkConfirm
      conditions:
        - id: confirmed
          condition: =Topic.confirmAction = "confirm"
          actions:
            - kind: BeginDialog
              id: callSharedFlow
              displayName: Redirect to ServiceNow HRSD System Common Execution
              input:
                binding:
                  scenarioName: msdyn_HRServiceNowHRSDCreateCase
                  parameters: ="{""params"":[{""key"":""{Subject}"",""value"":""" & Topic.Subject & """},{""key"":""{Description}"",""value"":""" & Topic.Description & """},{""key"":""{Priority}"",""value"":""" & Topic.Priority & """},{""key"":""{Opened_By}"",""value"":""" & Global.ESS_UserContext_Alias & """}]}"
              dialog: msdyn_copilotforemployeeselfservicehr.topic.ServiceNowHRSDSystemCommonExecution
              output:
                binding:
                  isSuccess: Topic.isSuccess
                  responseData: Topic.responseData
                  errorResponse: Topic.errorResponse

            - kind: ConditionGroup
              id: checkSuccess
              conditions:
                - id: success
                  condition: =Topic.isSuccess = true
                  actions:
                    - kind: SendActivity
                      id: sendSuccess
                      activity: "✅ Your HR case has been created successfully. You can track its status by asking me about your HR cases."
                - id: failure
                  condition: =Topic.isSuccess = false
                  actions:
                    - kind: SendActivity
                      id: sendError
                      activity: "I wasn't able to create the HR case. Please try again or contact your HR team directly."

        - id: cancelled
          condition: =Topic.confirmAction = "cancel"
          actions:
            - kind: SendActivity
              id: sendCancelled
              activity: "No problem — the HR case was not submitted."

    - kind: EndDialog
      id: endTopic
