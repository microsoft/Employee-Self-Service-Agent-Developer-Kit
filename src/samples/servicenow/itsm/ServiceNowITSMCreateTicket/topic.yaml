kind: AdaptiveDialog
modelDescription: |-
  You will respond to requests to create an IT support ticket or incident in
  ServiceNow ITSM. This topic collects the issue details and submits them
  through the shared ESS orchestrator flow.

  Example valid requests:
  "I need to create an IT ticket"
  "Open an IT support request"
  "I have a technical issue"
  "My laptop is broken, I need a ticket"
  "Submit an IT incident"
  "Report a technical problem"

  Example invalid requests:
  "Create an HR case" (use HRSD Create Case instead)
  "What's the status of my ticket?" (use Get Incident Status instead)

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - I need to create an IT ticket
      - Open an IT support request
      - I have a technical issue
      - My laptop is broken
      - Submit an IT incident
      - Report a technical problem
      - I need IT help

  actions:
    - kind: SendActivity
      id: sendIntro
      activity: "I can help you create an IT support ticket. Let me collect some details."

    - kind: Question
      id: askShortDesc
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.ShortDescription
      prompt: "Briefly describe the issue you're experiencing."
      entity: StringPrebuiltEntity

    - kind: Question
      id: askDescription
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Description
      prompt: "Please provide more details about the issue (steps to reproduce, error messages, etc.)."
      entity: StringPrebuiltEntity

    - kind: Question
      id: askCategory
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Category
      prompt: "What category best fits this issue?"
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: hardware
              displayName: Hardware
            - id: software
              displayName: Software
            - id: network
              displayName: Network
            - id: access
              displayName: Access / Permissions

    - kind: Question
      id: askUrgency
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.Urgency
      prompt: "How urgent is this issue?"
      entity:
        kind: EmbeddedEntity
        definition:
          kind: ClosedListEntity
          items:
            - id: "1"
              displayName: High — blocking my work
            - id: "2"
              displayName: Medium — impacting productivity
            - id: "3"
              displayName: Low — minor inconvenience

    - kind: AdaptiveCardPrompt
      id: confirmCard
      displayName: Confirm IT Ticket Details
      card: |-
        ={
          type: "AdaptiveCard",
          '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "Please confirm the IT ticket details:",
              weight: "Bolder",
              size: "Medium",
              wrap: true
            },
            {
              type: "FactSet",
              facts: [
                { title: "Summary", value: Topic.ShortDescription },
                { title: "Category", value: Topic.Category },
                { title: "Urgency", value: Topic.Urgency },
                { title: "Description", value: Topic.Description }
              ]
            }
          ],
          actions: [
            { type: "Action.Submit", title: "Create Ticket", data: { action: "confirm" } },
            { type: "Action.Submit", title: "Cancel", data: { action: "cancel" } }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.actionSubmitId
          action: Topic.confirmAction
      outputType:
        properties:
          actionSubmitId: String
          action: String

    - kind: ConditionGroup
      id: checkConfirm
      conditions:
        - id: confirmed
          condition: =Topic.confirmAction = "confirm"
          actions:
            - kind: BeginDialog
              id: callSharedFlow
              displayName: Redirect to ServiceNow ITSM System Common Execution
              input:
                binding:
                  scenarioName: msdyn_ITServiceNowITSMCreateTicket
                  parameters: ="{""params"":[{""key"":""{ShortDescription}"",""value"":""" & Topic.ShortDescription & """},{""key"":""{Description}"",""value"":""" & Topic.Description & """},{""key"":""{Category}"",""value"":""" & Topic.Category & """},{""key"":""{Urgency}"",""value"":""" & Topic.Urgency & """},{""key"":""{Caller}"",""value"":""" & Global.ESS_UserContext_Alias & """}]}"
              dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemCommonExecution
              output:
                binding:
                  isSuccess: Topic.isSuccess
                  responseData: Topic.responseData
                  errorResponse: Topic.errorResponse

            - kind: ConditionGroup
              id: checkSuccess
              conditions:
                - id: success
                  condition: =Topic.isSuccess = true
                  actions:
                    - kind: SendActivity
                      id: sendSuccess
                      activity: "✅ Your IT support ticket has been created. You can check its status anytime by asking me."
                - id: failure
                  condition: =Topic.isSuccess = false
                  actions:
                    - kind: SendActivity
                      id: sendError
                      activity: "I wasn't able to create the ticket. Please try again or contact your IT helpdesk directly."

        - id: cancelled
          condition: =Topic.confirmAction = "cancel"
          actions:
            - kind: SendActivity
              id: sendCancelled
              activity: "No problem — the ticket was not created."

    - kind: EndDialog
      id: endTopic
