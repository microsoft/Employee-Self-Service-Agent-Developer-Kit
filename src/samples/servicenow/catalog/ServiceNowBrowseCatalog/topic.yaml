kind: AdaptiveDialog
modelDescription: |-
  You will respond to requests about browsing or searching the ServiceNow
  service catalog. This returns available catalog items that employees can
  request (hardware, software, access, etc.).

  Example valid requests:
  "What can I request from the IT catalog?"
  "Show me available services"
  "I need to order new software"
  "Browse the service catalog"
  "What hardware can I request?"

  Example invalid requests:
  "Create a ticket" (use Create Ticket instead)
  "What's the status of my request?" (use Get Ticket Details instead)

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - What can I request from the IT catalog?
      - Show me available services
      - Browse the service catalog
      - What hardware can I request?
      - I need to order something from IT
      - Show me the IT service catalog

  actions:
    - kind: Question
      id: askSearch
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.SearchTerm
      prompt: "What type of item are you looking for? (e.g., laptop, software, VPN access, monitor)"
      entity: StringPrebuiltEntity

    - kind: SendActivity
      id: sendSearching
      activity: ="Searching the service catalog for \"" & Topic.SearchTerm & "\"..."

    - kind: BeginDialog
      id: callSharedFlow
      displayName: Redirect to ServiceNow System Common Execution
      input:
        binding:
          scenarioName: msdyn_ITServiceNowCatalogBrowse
          parameters: ="{""params"":[{""key"":""{SearchTerm}"",""value"":""" & Topic.SearchTerm & """}]}"
      dialog: msdyn_copilotforemployeeselfserviceit.topic.ServiceNowITSMSystemCommonExecution
      output:
        binding:
          isSuccess: Topic.isSuccess
          responseData: Topic.responseData
          errorResponse: Topic.errorResponse

    - kind: ConditionGroup
      id: checkResult
      conditions:
        - id: success
          condition: =Topic.isSuccess = true
          actions:
            - kind: AnswerQuestionWithAI
              id: formatResponse
              autoSend: true
              userInput: =Topic.responseData
              additionalInstructions: Display the catalog items as a numbered list with the item name, category, and short description. If no items match, suggest the user try different search terms or contact IT directly.
        - id: failure
          condition: =Topic.isSuccess = false
          actions:
            - kind: SendActivity
              id: sendError
              activity: "I wasn't able to search the catalog right now. Please try again later."

    - kind: EndDialog
      id: endTopic
