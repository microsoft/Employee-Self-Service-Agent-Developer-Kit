kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: CaseNumber
    description: The ServiceNow HR case number (e.g., CS0012345). If the user provides a case number in their request, extract it automatically.
    entity: StringPrebuiltEntity
    shouldPromptUser: false

modelDescription: |-
  You will respond to requests about the status of a specific open HR case in ServiceNow HRSD.
  The employee's HR case details, including case number, state, and description, are retrieved using
  the employee's email and displayed in an Adaptive Card.

  Example valid requests:
  "What is the status of my HR case?"
  "Check my HR case CS0012345"
  "What's happening with my open HR case?"
  "Give me an update on case HR0098765"
  "Track my HR case"

  Example invalid requests:
  "Show me all my HR cases" (use Get User Cases instead)
  "Create an HR case" (use Create HR Case instead)

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - What is the status of my HR case?
      - Check my HR case status
      - What's happening with my open HR case?
      - Give me an update on my HR case
      - Track my HR case
      - Show me my HR case details

  actions:
    - kind: ConditionGroup
      id: checkCaseNumber
      conditions:
        - id: needsCaseNumber
          condition: =IsBlank(Topic.CaseNumber)
          actions:
            - kind: Question
              id: askCaseNumber
              interruptionPolicy:
                allowInterruption: true
              variable: Topic.CaseNumber
              prompt: "What's your HR case number? (e.g., CS0012345)"
              entity: StringPrebuiltEntity

    - kind: SendActivity
      id: sendLookup
      activity: ="Looking up HR case " & Topic.CaseNumber & "..."

    - kind: BeginDialog
      id: callSharedFlow
      displayName: Redirect to ServiceNow HRSD System Common Execution
      input:
        binding:
          scenarioName: msdyn_HRServiceNowHRSDGetHRCaseStatus
          parameters: ="{""params"":[{""key"":""{CaseNumber}"",""value"":""" & Topic.CaseNumber & """},{""key"":""{Opened_By}"",""value"":""" & Global.ESS_UserContext_Alias & """}]}"
      dialog: msdyn_copilotforemployeeselfservicehr.topic.ServiceNowHRSDSystemCommonExecution
      output:
        binding:
          isSuccess: Topic.isSuccess
          responseData: Topic.responseData
          errorResponse: Topic.errorResponse

    - kind: ConditionGroup
      id: checkResult
      conditions:
        - id: success
          condition: =Topic.isSuccess = true
          actions:
            - kind: SendActivity
              id: showCaseCard
              activity:
                attachments:
                  - kind: AdaptiveCardTemplate
                    cardContent: |-
                      ={
                        type: "AdaptiveCard",
                        '$schema': "https://adaptivecards.io/schemas/adaptive-card.json",
                        version: "1.5",
                        body: [
                          {
                            type: "TextBlock",
                            text: "HR Case Status",
                            weight: "Bolder",
                            size: "Large",
                            color: "Accent",
                            wrap: true
                          },
                          {
                            type: "FactSet",
                            facts: [
                              { title: "Case Number", value: Text(ParseJSON(Topic.responseData).CaseNumber) },
                              { title: "State", value: Text(ParseJSON(Topic.responseData).State) },
                              { title: "Description", value: Text(ParseJSON(Topic.responseData).ShortDescription) }
                            ]
                          }
                        ]
                      }

        - id: failure
          condition: =Topic.isSuccess = false
          actions:
            - kind: SendActivity
              id: sendError
              activity: ="I couldn't find HR case " & Topic.CaseNumber & ". Please verify the case number and try again."

    - kind: EndDialog
      id: endTopic

inputType:
  properties:
    CaseNumber:
      displayName: CaseNumber
      description: The ServiceNow HR case number (e.g., CS0012345)
      type: String
