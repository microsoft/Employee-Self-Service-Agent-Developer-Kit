# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2.0
#
# ESS Agent Developer Kit — winget configuration
#
# Declaratively installs the toolchain required by
#   https://github.com/microsoft/Employee-Self-Service-Agent-Developer-Kit
# (specifically solutions/ess-maker-skills/).
#
# Usage (from any PowerShell prompt on Windows 10/11):
#   winget configure --file .\ess-adk-setup.winget.yaml --accept-configuration-agreements
#
# This file ONLY handles OS-level installs. VS Code extensions, repo clone,
# and workspace launch are handled by the companion script Install-EssAdk.ps1
# (which calls this file first, then layers the rest on top).
#
# Idempotent: re-running is safe; already-installed packages are skipped.

properties:
  configurationVersion: 0.2.0

  assertions:
    - resource: Microsoft.Windows.Developer/OsVersion
      directives:
        description: Require Windows 10 1809+ (winget configure prerequisite)
        allowPrerelease: true
      settings:
        MinVersion: "10.0.17763"

  resources:
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: vscode
      directives:
        description: Install Visual Studio Code (system installer, all users)
        allowPrerelease: false
      settings:
        id: Microsoft.VisualStudioCode
        source: winget
        Ensure: Present

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: python
      directives:
        description: Install Python 3.12 (adds python to PATH for all users)
        allowPrerelease: false
      settings:
        id: Python.Python.3.12
        source: winget
        Ensure: Present

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: pwsh
      directives:
        description: Install PowerShell 7 (pwsh)
        allowPrerelease: false
      settings:
        id: Microsoft.PowerShell
        source: winget
        Ensure: Present

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: git
      directives:
        description: Install Git for Windows
        allowPrerelease: false
      settings:
        id: Git.Git
        source: winget
        Ensure: Present

    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: gh
      directives:
        description: Install GitHub CLI (used for the device-code clone flow)
        allowPrerelease: false
      settings:
        id: GitHub.cli
        source: winget
        Ensure: Present
