        \n- ''Job Title'':  "},{"$kind":"ExpressionSegment","expression":{"$kind":"ValueExpression","variableReference":"Global.ESS_UserContext_Level"}},{"$kind":"TextSegment","value":"
        \n- ''Country'': "},{"$kind":"ExpressionSegment","expression":{"$kind":"ValueExpression","variableReference":"Global.ESS_UserContext_Country_Code"}},{"$kind":"TextSegment","value":"
        \n\nPrioritize information and entities mentioned in `user_profile` to: \n1)
