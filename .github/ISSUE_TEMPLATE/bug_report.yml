name: Bug report
description: Report a bug or unexpected behavior in the ESS Copilot Kit
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below to help us reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue.
      placeholder: |
        1. Run `/setup` in Copilot Chat
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and stack traces.
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Which command/area?
      options:
        - /setup
        - /connect (ServiceNow)
        - /connect (Workday)
        - /create
        - /update
        - /delete
        - /scan
        - /evaluate
        - /push
        - /flightcheck
        - MCP server (Workday)
        - MCP server (ServiceNow)
        - Other
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Copilot model used
      description: |
        Which model was selected when you hit the bug? You can find this in the model picker at the
        bottom of the Copilot Chat panel in VS Code (the model name appears next to the dropdown).
        Helpful for diagnosing model-specific issues, but not required.
      placeholder: "e.g., Claude Sonnet 4.6"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: VS Code version, OS, Python version, Copilot extension version
    validations:
      required: true