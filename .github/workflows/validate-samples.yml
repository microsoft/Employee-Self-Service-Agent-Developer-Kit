name: Validate samples

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "samples/**"
      - "tools/validate_samples/**"
      - "tests/test_validate_samples.py"
      - "pyproject.toml"
      - ".github/workflows/validate-samples.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Validator unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test deps
        run: pip install "pytest>=8,<9" "PyYAML>=6,<7"

      - name: Run pytest
        run: pytest tests/test_validate_samples.py -q

  validate:
    name: Static validation (samples/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Compute samples-only changed files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff --name-status "$BASE_SHA...HEAD" \
            | awk -F'\t' 'BEGIN{OFS="\t"} { if ($1 ~ /^[RC]/) { p=$3 } else { p=$2 } if (p ~ /^samples\//) { if ($1 ~ /^[RC]/) print "A", p; else print $1, p } }' \
            > samples-changed.txt
          if [ -s samples-changed.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          cat samples-changed.txt || true

      - name: Run validator
        id: validate
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set +e
          python -m tools.validate_samples --paths-file samples-changed.txt --repo-root . > validation.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat validation.txt
          # Always surface in step summary
          {
            echo "## Samples static validation"
            echo ""
            echo '```text'
            cat validation.txt
            echo '```'
            echo ""
            echo "_Runtime validation in Power Platform is a manual follow-up. See [tools/validate_samples/README.md](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/tools/validate_samples/README.md)._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compose PR comment body
        if: always() && steps.changed.outputs.has_changes == 'true'
        run: |
          {
            echo "## Samples static validation"
            echo ""
            echo '```text'
            cat validation.txt
            echo '```'
            echo ""
            echo "_Runtime validation in Power Platform is a manual follow-up. See \`tools/validate_samples/README.md\`._"
          } > validation-comment.md

      - name: Post / update PR comment
        if: always() && steps.changed.outputs.has_changes == 'true'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: samples-validation
          path: validation-comment.md

      - name: Fail the job if validation failed
        if: steps.validate.outputs.exit_code != '0'
        run: |
          echo "::error::Static validation failed. See the PR comment or job summary."
          exit 1
