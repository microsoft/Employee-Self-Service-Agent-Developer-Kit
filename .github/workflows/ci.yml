name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ruff
      run: pip install ruff

    - name: Lint with ruff
      run: ruff check scripts/ src/mcp/ --output-format=github
      continue-on-error: true

    - name: Check Python syntax
      run: |
        python -m compileall -q scripts/ src/mcp/