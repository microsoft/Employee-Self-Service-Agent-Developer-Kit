name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install ruff
      run: pip install ruff

    - name: Discover Python source paths
      id: discover
      run: |
        candidates="solutions/ess-maker-skills/scripts solutions/ess-maker-skills/src/mcp"
        paths=""
        for d in $candidates; do
          if [ -d "$d" ] && find "$d" -type f -name "*.py" 2>/dev/null | grep -q .; then
            paths="$paths $d"
          fi
        done
        paths=$(echo "$paths" | xargs)
        echo "paths=$paths" >> "$GITHUB_OUTPUT"
        if [ -n "$paths" ]; then
          echo "has_python=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Linting Python in: $paths"
        else
          echo "has_python=false" >> "$GITHUB_OUTPUT"
          echo "::notice::No Python files under $candidates - skipping lint and syntax check. (Expected on branches that don't yet include Python sources; the slice PRs #29/#30/#31 add them.)"
        fi

    - name: Lint with ruff
      if: steps.discover.outputs.has_python == 'true'
      env:
        PATHS: ${{ steps.discover.outputs.paths }}
      run: ruff check $PATHS --output-format=github

    - name: Check Python syntax
      if: steps.discover.outputs.has_python == 'true'
      env:
        PATHS: ${{ steps.discover.outputs.paths }}
      run: |
        python -m compileall -q $PATHS

  installer-scripts:
    name: Installer script smoke tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # pwsh is preinstalled on GitHub-hosted ubuntu runners. The harness only
    # parses and string-matches the setup scripts (no OS-specific execution),
    # so it runs cross-platform. Guards against the Windows PowerShell 5.1
    # parse crash by asserting the scripts stay ASCII-only. See PR #185.
    - name: Run installer smoke tests
      shell: pwsh
      run: ./setup/Install-EssAdk.Tests.ps1

  flightcheck-url-hygiene:
    name: FlightCheck URL host hygiene
    runs-on: ubuntu-latest

    # Deterministic, offline gate: asserts every URL host emitted by
    # FlightCheck source is registered in tests/flightcheck/url_registry.py
    # and that portal/API hosts use https. No network, so it is safe to
    # gate every PR on. It does NOT verify a path is live (that a
    # learn.microsoft.com article still exists) — stale-path detection is a
    # separate, networked concern kept out of this deterministic job.
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install pytest
      run: pip install "pytest>=8,<9"

    - name: Run URL host hygiene test
      run: python -m pytest tests/flightcheck/test_url_hygiene.py -q