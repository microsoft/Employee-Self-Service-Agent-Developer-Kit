#
# CodeQL configuration for this repository.
#
# Path-level scoping: the recording wrappers under `tests/captures/`
# are operator-driven scripts that a developer runs locally to capture
# API response cassettes for the FlightCheck test suite. They:
#
#   * are never executed in CI or any production runtime,
#   * are already classified by CodeQL as test code
#     (`"classifications": ["test"]` in every alert that targets them),
#   * print credential-derived values (status codes, response bodies,
#     env metadata) to stdout for the operator's eyes only,
#   * are followed by an explicit redactor pass
#     (`tests/captures/_redact.py`) before any captured cassette is
#     committed.
#
# CodeQL's `py/clear-text-logging-sensitive-data` query relies on
# heuristic-based source detection (dict subscript keys matching
# "oauth", "password", "secret") combined with data-flow tracking
# that does not recognize `re.sub`-based scrubbing as a sanitizer
# barrier. As a result the rule produces unactionable alerts on
# legitimate operator-diagnostic prints in these recording wrappers,
# and there is no code-level rewrite that satisfies the query without
# removing diagnostic information that the operator needs.
#
# We continue to run all default-suite queries against:
#   * all production code under `solutions/`
#   * all FlightCheck production checks under
#     `solutions/ess-maker-skills/scripts/flightcheck/`
#   * all unit/integration tests under `tests/` *except* the operator
#     recording wrappers in `tests/captures/`
#
# So `py/clear-text-logging-sensitive-data` still catches a real
# clear-text-logging issue if one is introduced into actual product
# code or into test code that runs in CI.
#
# See `tests/AGENTS.md` and
# `solutions/ess-maker-skills/scripts/flightcheck/AGENTS.md` for the
# rules around recording wrappers and cassette redaction.

name: "ESS Agent Developer Kit CodeQL config"

paths-ignore:
  # Operator-driven recording wrappers — see header comment for rationale.
  - tests/captures/**
